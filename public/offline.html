<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline - OROSHYA APP</title>

    <style>
      body {
        margin: 0;
        font-family: system-ui, sans-serif;
        background: #020617;
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
      }

      .card {
        text-align: center;
        padding: 30px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        max-width: 320px;
      }

      h1 {
        margin-bottom: 10px;
      }

      p {
        color: #94a3b8;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You're Offline</h1>
      <p>
        Please check your internet connection.<br />
        OROSHYA APP will reconnect automatically.
      </p>
    </div>
  </body>
</html>
